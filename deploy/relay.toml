# Public beta Relay Server configuration.
#
# Listener fields enable their transport by presence. Remove udp_bind to run
# TCP only, or remove tcp_bind to run UDP only. Public hosts must open the same
# port/protocol in their firewall.
[relay_server]
udp_bind = "0.0.0.0:25910"
tcp_bind = "0.0.0.0:25910"

[admission]
# Room join proof-of-work difficulty. Use 18 for public beta relays. Set to 0
# only for local/private development relays where join-spam protection is not
# needed.
pow_difficulty_bits = 18

[room_limits]
# Maximum active rooms kept in memory at one time. Other room/peer/idle limits
# are shared built-in defaults.
max_rooms = 256

[traffic_limits]
# Per-peer admitted traffic limits. Defaults match these values.
rate_limit_per_second = 5000
byte_rate_limit_per_second = 8388608
byte_rate_limit_burst = 16777216

[access_control]
# Optional IP/CIDR blocklist for obvious abuse sources.
# Examples: ["203.0.113.10/32", "2001:db8::/32"]
blocked_cidrs = []

# OpenTelemetry is disabled when this whole section is absent. Uncomment all
# fields to export standard OTLP/gRPC metrics and traces to a local Collector,
# Vector, SigNoz collector, or any other compatible receiver.
# [telemetry]
# otlp_endpoint = "http://127.0.0.1:4317"
# service_instance_id = "relay-guangzhou-1"
