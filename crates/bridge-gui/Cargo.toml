[package]
name = "basement-bridge-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[features]
internal-test = ["basement-bridge-core/internal-test"]

[[bin]]
name = "basement-bridge"
path = "src/main.rs"

[dependencies]
basement-bridge-core = { path = "../bridge-core" }
directories = "6.0.0"
eframe = { version = "0.35.0", default-features = false, features = [
    "accesskit",
    "default_fonts",
    "glow",
] }
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
