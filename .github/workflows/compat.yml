name: Compatibility

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base branch, tag, or SHA to compare."
        required: false
        type: string
        default: main
      head_ref:
        description: "Head branch, tag, or SHA to check."
        required: false
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BASE_REF: ${{ github.event.pull_request.base.sha || github.event.inputs.base_ref || github.event.repository.default_branch }}
  HEAD_REF: ${{ github.event.pull_request.head.sha || github.event.inputs.head_ref || github.sha }}

jobs:
  client-server-compat:
    name: Relay Protocol v2 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.HEAD_REF }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Verify v2 wire compatibility contract
        run: cargo test --locked -p tractor-beam-relay-protocol --test v2_wire_contract

      - name: Verify live Relay negotiation
        run: cargo test --locked -p tractor-beam-relay server_v2::tests::real_tcp_socket_
