name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.release.outputs.prs_created == 'true' }}

      - uses: Swatinem/rust-cache@v2.9.1
        if: ${{ steps.release.outputs.prs_created == 'true' }}

      - name: Sync release lockfile
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          cargo update --workspace
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already matches the release PR version."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync release lockfile"
          git push origin HEAD:${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}

  publish-release:
    name: Build and publish release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
