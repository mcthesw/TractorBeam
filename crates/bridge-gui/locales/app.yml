  en_US: "LAN Direct"
help.route:
  zh_CN: "外部 Relay 与局域网直连互斥；切换前需要先停止当前联机。局域网直连只使用现有物理或虚拟局域网，不会连接 Relay，也不提供 NAT 穿透。"
  en_US: "External Relay and LAN Direct are mutually exclusive. Stop the current session before switching. LAN Direct only uses an existing physical or virtual LAN; it does not contact a Relay or provide NAT traversal."
lan.create_title:
  zh_CN: "创建局域网联机码"
  en_US: "Create LAN Join Code"
lan.adapters:
  zh_CN: "用于局域网联机的网卡"
  en_US: "Adapters for LAN play"
lan.disclosure:
  zh_CN: "默认选择更可能用于局域网联机的网卡；你也可以手动调整，最多选择 8 张。创建时会自动忽略当前不可用的地址。联机码包含最终可用的 IP 和临时房间凭据，请只分享给可信玩家。"
  en_US: "Adapters most likely to work for LAN play are selected by default; you may adjust the selection, up to 8 adapters. Addresses that are currently unavailable are ignored when creating the room. The Join Code contains the usable IPs and a temporary room credential; share it only with trusted players."
