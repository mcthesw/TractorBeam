[package]
name = "basement-bridge-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[dependencies]
basement-isaac-injector = { path = "../isaac-injector" }
bytes = "1.11.1"
directories = "6.0.0"
open = { version = "5.3.5", features = ["shellexecute-on-windows"] }
regex = "1.12.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"

[target."cfg(windows)".dependencies]
winreg = "0.56.0"
