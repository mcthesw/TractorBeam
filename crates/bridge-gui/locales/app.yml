help.lan_join_code:
  zh_CN: "尚未加入房间时，复制会先让你选择要公开的网卡，再创建联机码。任何已加入的玩家都可以复制自己的局域网联机码邀请其他人；最初创建者离开不会结束房间。"
  en_US: "Before joining a room, Copy first lets you choose which adapters to disclose, then creates the Join Code. Any admitted player can copy their own LAN Join Code to invite others; the original creator leaving does not end the room."
