# Package this file as config.toml in the Client Bundle root.
default_room_template = "bb-{date:%Y%m%d}"
default_transport = "tcp"
default_mode = "pure"
selected_relay = "beijing"

[session_health]
enabled = true
runtime_rtt_enabled = true
snapshot_interval_seconds = 5
runtime_rtt_interval_seconds = 1
runtime_rtt_timeout_seconds = 3

