# Package this file as config.toml in the Client Bundle root.
default_transport = "tcp"
default_mode = "pure"
selected_relay = "guangzhou"

[session_health]
enabled = true
runtime_rtt_enabled = true
snapshot_interval_seconds = 5
runtime_rtt_interval_seconds = 1
runtime_rtt_timeout_seconds = 3

[[relays]]
id = "beijing"
name = "Beijing test relay"
host = "beijing-relay.example.test"
port = 25910
udp = true
tcp = true
default_transport = "tcp"

[[relays]]
id = "guangzhou"
name = "Guangzhou test relay"
host = "guangzhou-relay.example.test"
port = 25910
udp = true
tcp = true
default_transport = "tcp"
