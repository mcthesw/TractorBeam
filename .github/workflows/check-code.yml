name: Check Code

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  actions: write
  contents: read

concurrency:
  group: check-code-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check locked workspace
        run: cargo check --locked --workspace

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Build Relay Server
        run: cargo build --locked --release -p basement-bridge-relay

  windows:
    name: Windows targets
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2.9.1

      - name: Build Bridge GUI
        run: cargo build --locked --release -p basement-bridge-gui --target x86_64-pc-windows-msvc

      - name: Build Injector
        run: cargo build --locked --release -p basement-isaac-injector --target i686-pc-windows-msvc

      - name: Build Native Hook
        run: cargo build --locked --release -p basement-native-hook --target i686-pc-windows-msvc
