services:
  relay:
    # Published Relay Server image. Formal release assets replace :latest with
    # the matching release tag for reproducible deployments.
    image: ghcr.io/mcthesw/tractor-beam-relay:latest
    restart: unless-stopped
    ports:
      - "25910:25910/udp"
      - "25910:25910/tcp"
    volumes:
      # Keep relay.toml next to this compose file when running docker compose.
      - ./relay.toml:/etc/tractor-beam/relay.toml:ro
    environment:
      # Keep local output readable by default; set LOG_FORMAT=json when a log
      # collector parses container stdout.
      LOG_FORMAT: ${LOG_FORMAT:-text}
    command: ["--config", "/etc/tractor-beam/relay.toml"]
