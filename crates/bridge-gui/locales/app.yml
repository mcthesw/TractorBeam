  zh_CN: "UDP 通常延迟更低，但部分网络可能无法使用或被丢包，建议运行测试后选用"
  en_US: "UDP usually offers lower latency, but may be unavailable or suffer packet loss on some networks; run the connection test before choosing it"
help.relay_server:
  zh_CN: "中继模式进行转发的服务器，建议选择延迟最低的"
  en_US: "The server that forwards traffic in Relay modes; choose the one with the lowest latency"
help.steam_account:
  zh_CN: "使用本次运行需要的账号，未检测到时可手动填写 SteamID64 和显示名称"
  en_US: "The account used for this run; enter its SteamID64 and display name manually when it is not detected"
help.join_code:
  zh_CN: "联机码包含 Relay 位置和房间凭据。房主复制后发给其他玩家；加入者导入收到的联机码；新房间会立即生成新的凭据并使当前联机码失效"
  en_US: "The Join Code contains the Relay location and Room credential. Hosts copy and share it; joining players import it; New Room immediately creates a new credential and invalidates the current code"
relay.join_code:
  zh_CN: "Relay 联机码"
  en_US: "Relay Join Code"
help.mode:
  zh_CN: "Official 只使用游戏原有的联机方式；Fallback 优先使用 Tractor Beam，并允许官方联机作为后备；Pure 只使用 Tractor Beam"
  en_US: "Official uses only the game's original networking; Fallback prefers Tractor Beam and keeps official networking as a backup; Pure uses only Tractor Beam"
help.input_delay:
  zh_CN: "网络状态不好的情况下调低会导致体验严重下降，谨慎调整"
  en_US: "Lowering this on a poor network can severely degrade the experience; adjust with care"
help.session_quality:
  zh_CN: "根据最近的延迟、丢包和收包节奏概括当前联机状态"
  en_US: "Summarizes the current session from recent latency, drops, and packet timing"
help.counters:
  zh_CN: "从本次启动以来累计的数据量和错误，仅用于判断数据是否正常流动"
  en_US: "Totals since this app start, useful for checking whether data is flowing normally"
help.probe.relay_readiness:
  zh_CN: "测试当前选择relay的连通性、延迟和抖动，需要约30秒"
  en_US: "Tests the selected Relay's reachability, latency, and jitter; takes about 30 seconds"
help.probe.hook_receive:
  zh_CN: "显示程序与游戏 Hook 的本机通信状态，不涉及外部网络"
  en_US: "Shows local communication between the app and game Hook without involving the external network"
